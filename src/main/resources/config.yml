# ╔══════════════════════════════════════════════════════════════════════════╗
# ║                    ChromaWars  –  config.yml                           ║
# ║  Barvy: MiniMessage tagy  <red>  <#FF4444>  <gradient:#F00:#00F>       ║
# ║  nebo  legacy hex  &#FF4444   (automaticky konvertováno)               ║
# ╚══════════════════════════════════════════════════════════════════════════╝

# ─────────────────────────────────────────────────────────────────────────────
#  HERNÍ NASTAVENÍ
#  Číst v: ConfigManager.loadGameSettings()
# ─────────────────────────────────────────────────────────────────────────────
game:
  default-elo: 1000           # výchozí ELO pro nové hráče
  lobby-countdown: 30         # sekundy odpočtu v lobby před startem
  game-duration: 180          # délka hry v sekundách (180 = 3 minuty)
  min-players: 2              # minimální počet hráčů pro spuštění hry
  win-percentage: 90.0        # % arény které musí tým obsadit pro okamžitou výhru
  elo-win: 25                 # ELO za výhru
  elo-loss: 15                # ELO ztráta za prohru

# ─────────────────────────────────────────────────────────────────────────────
#  TÝMY
#  Číst v: ConfigManager.loadTeams()
#  Klíč (např. "red") = interní teamId používané v celém pluginu
# ─────────────────────────────────────────────────────────────────────────────
teams:
  red:
    name: "&#FF4444Červený"         # zobrazovaný název (MiniMessage)
    color: "&#FF4444"               # HEX barva týmu pro tituly, scoreboardy
    block: RED_CONCRETE             # Bukkit Material pro obarvení podlahy
    max-players: 4                  # max hráčů v tomto týmu
    armor-color: "FF4444"           # RGB hex pro leather armor (BEZ # znaku!)

  blue:
    name: "&#4477FFModrý"
    color: "&#4477FF"
    block: BLUE_CONCRETE
    max-players: 4
    armor-color: "4477FF"

  green:
    name: "&#44DD44Zelený"
    color: "&#44DD44"
    block: GREEN_CONCRETE
    max-players: 4
    armor-color: "44DD44"

  yellow:
    name: "&#FFDD00Žlutý"
    color: "&#FFDD00"
    block: YELLOW_CONCRETE
    max-players: 4
    armor-color: "FFDD00"

# ─────────────────────────────────────────────────────────────────────────────
#  LOBBY LOKACE
#  Číst v: ConfigManager.loadLobbyLocation()
#  Nastavit přes: /chroma setlobby
# ─────────────────────────────────────────────────────────────────────────────
lobby:
  world: "world"
  x: 0.5
  y: 64.0
  z: 0.5
  yaw: 0.0
  pitch: 0.0

# ─────────────────────────────────────────────────────────────────────────────
#  ARÉNY
#  Plní se automaticky přes: /chroma arena create <název>
#  Ruční zápis je také možný (pos1/pos2 = rohové body kuboid oblasti)
# ─────────────────────────────────────────────────────────────────────────────
arenas: {}
# Příklad hotové arény:
# arenas:
#   arena1:
#     world: "world"
#     pos1:
#       x: 100
#       y: 64
#       z: 100
#     pos2:
#       x: 164
#       y: 66
#       z: 164

# ─────────────────────────────────────────────────────────────────────────────
#  SCOREBOARD – LOBBY
#  Číst v: ScoreboardManager.buildLobbyVars()  +  startLobbyTask()
#
#  Dostupné proměnné v řádcích (lines):
#    {player}          – přezdívka hráče
#    {elo}             – ELO hráče (z PlayerSession cache)
#    {position}        – pořadí hráče v žebříčku (nebo – pokud není v TOP100)
#    {top1_name}       – jméno 1. hráče žebříčku (z EloManager cache)
#    {top1_elo}        – ELO  1. hráče
#    {top2_name}       – jméno 2. hráče
#    {top2_elo}        – ELO  2. hráče
#    {top3_name}       – jméno 3. hráče
#    {top3_elo}        – ELO  3. hráče
#    {players_online}  – počet online hráčů
#    {countdown}       – odpočet do startu (sekundy)
#    {map_vote}        – aktuálně vedoucí mapa hlasování
#
#  Prázdný řetězec "" = prázdný řádek (oddělovač)
# ─────────────────────────────────────────────────────────────────────────────
scoreboard:
  lobby:
    enabled: true
    update-interval: 20           # ticky (20 = 1 sekunda)
    title: "<bold><gradient:&#FF4444:&#4477FF>ChromaWars</gradient></bold>"
    lines:
      - ""
      - "&#FFDD00 ⭐ &#FFFFFF{top1_name} &#888888{top1_elo}"
      - "&#AAAAAA ② &#FFFFFF{top2_name} &#888888{top2_elo}"
      - "&#AAAAAA ③ &#FFFFFF{top3_name} &#888888{top3_elo}"
      - ""
      - "&#AAAAAA Hráčů: &#FFFFFF{players_online}"
      - "&#AAAAAA Start:  &#FFDD00{countdown}s"
      - "&#AAAAAA Mapa:   &#FFFFFF{map_vote}"
      - ""
      - "&#AAAAAA Tvé ELO:   &#FF4444{elo}"
      - "&#AAAAAA Pořadí:    &#FFFFFF#{position}"
      - ""
      - "&#555555play.server.cz"

  # ── IN-GAME SCOREBOARD ───────────────────────────────────────────────────
  #  Číst v: ScoreboardManager.buildIngameVars()  +  startIngameTask()
  #
  #  Dostupné proměnné:
  #    {player}       – přezdívka hráče
  #    {team}         – název týmu hráče
  #    {arena}        – název aktuální arény
  #    {time_left}    – zbývající čas ve formátu m:ss
  #    {red_pct}      – % pokrytí červeného týmu (1 desetinné místo)
  #    {blue_pct}     – % pokrytí modrého týmu
  #    {green_pct}    – % pokrytí zeleného týmu
  #    {yellow_pct}   – % pokrytí žlutého týmu
  # ─────────────────────────────────────────────────────────────────────────
  ingame:
    enabled: true
    update-interval: 10           # ticky (10 = 0.5 sekundy)
    title: "<bold><gradient:&#FF4444:&#4477FF>ChromaWars</gradient></bold>"
    lines:
      - ""
      - "&#AAAAAA Aréna:  &#FFFFFF{arena}"
      - "&#AAAAAA Čas:    &#FFDD00{time_left}"
      - ""
      - "&#FF4444● &#FFFFFF{red_pct}%"
      - "&#4477FF● &#FFFFFF{blue_pct}%"
      - "&#44DD44● &#FFFFFF{green_pct}%"
      - "&#FFDD00● &#FFFFFF{yellow_pct}%"
      - ""
      - "&#AAAAAA Tým: {team}"
      - ""
      - "&#555555play.server.cz"

# ─────────────────────────────────────────────────────────────────────────────
#  GUI – JOIN  (/join)
#  Číst v: MenuManager.openJoinMenu()
#
#  rows: 1–6 (počet řad inventáře, 1 řada = 9 slotů)
#  Sloty se počítají zleva doprava, shora dolů: 0–8 první řada, 9–17 druhá atd.
#
#  team-slots: mapování teamId → číslo slotu
#    Týmy definované v sekci "teams" výše musí mít odpovídající slot.
#
#  team-item:
#    material: použije block materiál týmu (RED_CONCRETE apod.) – neměnit
#    name:     MiniMessage název tlačítka
#    lore:     seznam řádků lore (MiniMessage)
#
#  Proměnné dostupné v name a lore team-item:
#    {team_name}   – barevný název týmu z teams sekce
#    {current}     – aktuální počet hráčů v týmu
#    {max}         – maximální počet hráčů v týmu
#
#  fill-empty: vyplní prázdné sloty dekorativním sklem
# ─────────────────────────────────────────────────────────────────────────────
gui:
  join:
    title: "&#FFFFFF⚔ Vyber si tým"
    rows: 3

    fill-empty:
      enabled: true
      material: GRAY_STAINED_GLASS_PANE
      name: " "

    # Pozice tlačítek týmů (pro 3 řady: sloty 0–26)
    team-slots:
      red:    11
      blue:   13
      green:  15
      yellow: 17

    team-item:
      name: "{team_name}"
      lore:
        - ""
        - "&#AAAAAA Hráčů v týmu:"
        - "&#FFFFFF  {current} &#AAAAAA/ {max}"
        - ""
        - "&#FFDD00▶ Klikni pro vstup do týmu"
        - ""

    # Extra tlačítka (volitelná)
    extra-buttons:
      random:
        enabled: true
        slot: 22
        material: COMPASS
        name: "&#FFFFFF🎲 Náhodný tým"
        lore:
          - ""
          - "&#AAAAAA Přiřadí tě do"
          - "&#AAAAAA nejméně obsazeného týmu."
          - ""

  # ── GUI – VOTEMAP  (/votemap) ─────────────────────────────────────────────
  #  Číst v: MenuManager.openVoteMenu()
  #
  #  Proměnné dostupné v map-item name a lore:
  #    {map_name}     – název arény
  #    {votes}        – počet hlasů pro tuto mapu
  #    {total_votes}  – celkový počet odevzdaných hlasů
  #    {voted}        – "<green>✔</green>" pokud hráč hlasoval pro tuto mapu
  #
  #  layout:
  #    mode: auto     – mapy se umísťují zleva doprava od start-slot
  #    spacing: 2     – počet slotů mezery mezi mapami
  #
  #  info-panel: informační slot s výsledky hlasování
  #    Proměnné: {total_votes}  {top_map}  {countdown}
  # ─────────────────────────────────────────────────────────────────────────
  votemap:
    title: "&#FFFFFF🗺 Hlasuj o mapě"
    rows: 3

    fill-empty:
      enabled: true
      material: GRAY_STAINED_GLASS_PANE
      name: " "

    map-item:
      material: MAP
      name: "&#FFFFFF{map_name} {voted}"
      lore:
        - ""
        - "&#AAAAAA Hlasů: &#FFDD00{votes} &#AAAAAA/ {total_votes}"
        - ""
        - "&#FFDD00▶ Klikni pro hlasování"
        - ""

    layout:
      mode: auto          # auto = zleva doprava
      start-slot: 10      # první slot pro mapy
      spacing: 2          # mezera mezi mapami (počet slotů)

    info-panel:
      enabled: true
      slot: 26
      material: PAPER
      name: "&#FFDD00📊 Výsledky hlasování"
      lore:
        - ""
        - "&#AAAAAA Celkem hlasů: &#FFFFFF{total_votes}"
        - ""
        - "&#AAAAAA Vedoucí mapa:"
        - "&#FFFFFF  {top_map}"
        - ""
        - "&#AAAAAA Start za: &#FFDD00{countdown}s"
        - ""